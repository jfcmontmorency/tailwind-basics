<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tailwindcss</title>
  <!-- Doit rester un script synchrone inline dans <head> (pas dans main.js,
       chargé en module donc différé) pour éviter un flash du mauvais thème
       avant le premier rendu. -->
  <script>
    (function () {
      try {
        var stored = localStorage.getItem('theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = stored || (prefersDark ? 'dracula' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) { }
    })();
  </script>
</head>

<body
  class="min-h-screen font-sans text-base-content bg-gradient-to-b from-base-100 via-base-100 to-base-200 bg-fixed transition-colors duration-300">

  <!-- ===================== HEADER ===================== -->
  <header
    class="sticky top-0 z-20 backdrop-blur bg-base-100/80 border-b border-base-300 transition-colors duration-300">
    <div class="max-w-3xl mx-auto px-4 py-3 flex items-center justify-between gap-3">
      <button type="button" onclick="goHome()"
        class="flex items-center gap-2.5 bg-transparent border-0 p-0 cursor-pointer hover:opacity-80 transition-opacity">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 54 33" class="w-8 h-8">
          <g clip-path="url(#prefix__clip0)">
            <path fill="#38bdf8" fill-rule="evenodd"
              d="M27 0c-7.2 0-11.7 3.6-13.5 10.8 2.7-3.6 5.85-4.95 9.45-4.05 2.054.513 3.522 2.004 5.147 3.653C30.744 13.09 33.808 16.2 40.5 16.2c7.2 0 11.7-3.6 13.5-10.8-2.7 3.6-5.85 4.95-9.45 4.05-2.054-.513-3.522-2.004-5.147-3.653C36.756 3.11 33.692 0 27 0zM13.5 16.2C6.3 16.2 1.8 19.8 0 27c2.7-3.6 5.85-4.95 9.45-4.05 2.054.514 3.522 2.004 5.147 3.653C17.244 29.29 20.308 32.4 27 32.4c7.2 0 11.7-3.6 13.5-10.8-2.7 3.6-5.85 4.95-9.45 4.05-2.054-.513-3.522-2.004-5.147-3.653C23.256 19.31 20.192 16.2 13.5 16.2z"
              clip-rule="evenodd" />
          </g>
          <defs>
            <clipPath id="prefix__clip0">
              <path fill="#fff" d="M0 0h54v32.4H0z" />
            </clipPath>
          </defs>
        </svg>
        <span class="font-bold">Tailwind</span>
      </button>
      <input type="checkbox" id="theme-toggle" onchange="toggleTheme()" class="toggle toggle-sm"
        aria-label="Basculer le mode sombre" title="Mode sombre" />
    </div>
    <progress id="progress-bar" class="progress progress-primary w-full h-1.5 rounded-none block" value="0"
      max="100"></progress>
  </header>

  <main class="max-w-3xl mx-auto px-4 pb-12 pt-8">

    <!-- ===================== ECRAN INTRO ===================== -->
    <section id="screen-intro" class="animate-[pop_0.25s_ease-out]">
      <div class="card bg-base-100 border border-base-300 shadow-sm">
        <div class="card-body items-center text-center py-10 px-8">
          <h1
            class="text-3xl font-extrabold mb-3 bg-gradient-to-br from-primary to-secondary bg-clip-text text-transparent">
            Tailwind</h1>
          

          <div class="w-full grid gap-4 text-left">
            <!-- Étape 1 : Bases -->
            <div class="card bg-base-200 border border-base-300">
              <div class="card-body flex-row items-center justify-between gap-4 py-4">
                <div class="flex items-center gap-3">
                  <span id="step-bases-badge" class="badge badge-primary badge-lg">1</span>
                  <div>
                    <div class="font-bold">Bases</div>
                    
                  </div>
                </div>
                <div class="flex gap-2">
                  <button id="step-bases-restart-btn" onclick="restartTrack('bases')"
                    class="btn btn-outline btn-sm hidden">Recommencer ↻</button>
                  <button id="step-bases-btn" onclick="startGame('bases')" class="btn btn-primary btn-sm">Commencer →</button>
                </div>
              </div>
            </div>

            <!-- Étape 2 : Layout -->
            <div class="card bg-base-200 border border-base-300">
              <div class="card-body flex-row items-center justify-between gap-4 py-4">
                <div class="flex items-center gap-3">
                  <span id="step-layout-badge" class="badge badge-primary badge-lg">2</span>
                  <div>
                    <div class="font-bold">Layout</div>
                  </div>
                </div>
                <div class="flex gap-2">
                  <button id="step-layout-restart-btn" onclick="restartTrack('layout')"
                    class="btn btn-outline btn-sm hidden">Recommencer ↻</button>
                  <button id="step-layout-btn" onclick="startGame('layout')" class="btn btn-primary btn-sm">Commencer →</button>
                </div>
              </div>
            </div>

            <!-- Étape 3 : Responsive -->
            <div class="card bg-base-200 border border-base-300">
              <div class="card-body flex-row items-center justify-between gap-4 py-4">
                <div class="flex items-center gap-3">
                  <span id="step-responsive-badge" class="badge badge-primary badge-lg">3</span>
                  <div>
                    <div class="font-bold">Responsive</div>
                  
                  </div>
                </div>
                <div class="flex gap-2">
                  <button id="step-responsive-restart-btn" onclick="restartTrack('responsive')"
                    class="btn btn-outline btn-sm hidden">Recommencer ↻</button>
                  <button id="step-responsive-btn" onclick="startGame('responsive')" class="btn btn-primary btn-sm">Commencer →</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- ===================== ECRAN JEU ===================== -->
    <section id="screen-game" class="hidden">
      <div class="flex items-center justify-between mb-3">
        <span id="level-counter" class="text-sm font-semibold text-base-content/60"></span>
        <span id="level-topic" class="badge badge-lg"></span>
      </div>

      <div class="card bg-base-100 border border-base-300 shadow-sm mb-4">
        <div class="card-body">
          <h2 id="level-title" class="card-title"></h2>
          <div id="level-explanation" class="grid gap-2"></div>
        </div>
      </div>

      <div id="exercise-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4">
        <div class="card bg-base-100 border border-base-300 shadow-sm">
          <div class="card-body">
            <div class="text-xs font-extrabold uppercase tracking-wide text-base-content mb-3">🎯 Résultat attendu</div>
            <div id="preview-box-target" class="border-2  border-base-300 rounded-xl min-h-[120px] p-4">
              <div id="target-box"></div>
            </div>
          </div>
        </div>
        <div class="card bg-base-100 border border-base-300 shadow-sm">
          <div class="card-body">
            <div class="text-xs font-extrabold uppercase tracking-wide text-base-content mb-3">Aperçu</div>
            <div id="preview-box-user" class="border-2 border-base-300 rounded-xl min-h-[120px] p-4">
              <div id="user-box"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Niveaux "Responsive" uniquement : un vrai <iframe> redimensionnable,
           pour que les breakpoints réagissent à une vraie largeur de viewport
           (comme le widget de la page d'accueil de tailwindcss.com), plutôt
           qu'une simulation JS. -->
      <div id="responsive-preview-section" class="hidden card bg-base-100 border border-base-300 shadow-sm mb-4">
        <div class="card-body">
          <div class="flex items-center justify-between text-xs text-base-content/60 mb-1">
            <span>📱 320px</span>
            <span id="responsive-width-label" class="font-mono font-bold text-primary"></span>
            <span>🖥️ 1300px</span>
          </div>
          <input type="range" id="responsive-slider" min="320" max="1300" value="480"
            class="range range-primary range-sm w-full mb-4">

          <div class="text-xs font-extrabold uppercase tracking-wide text-base-content mb-2">🎯 Résultat attendu</div>
          <div id="responsive-frame-target" class="overflow-hidden border-2 border-base-300 rounded-xl mx-auto mb-4 transition-[width,height] duration-150">
            <iframe id="responsive-iframe-target" class="block border-0" title="Aperçu responsive - cible" style="transform-origin: top left;"></iframe>
          </div>

          <div class="text-xs font-extrabold uppercase tracking-wide text-base-content mb-2">Aperçu</div>
          <div id="responsive-frame-user" class="overflow-hidden border-2 border-base-300 rounded-xl mx-auto transition-[width,height] duration-150">
            <iframe id="responsive-iframe-user" class="block border-0" title="Aperçu responsive - ta version" style="transform-origin: top left;"></iframe>
          </div>
        </div>
      </div>

      <div class="card bg-base-100 border border-base-300 shadow-sm mb-4">
        <div class="card-body">
          <!-- <label class="block text-xs font-extrabold uppercase tracking-wide text-base-content/50 mb-2">Classes Tailwind
            séparées par des espaces</label> -->
          <div class="text-center"><span class="font-mono">&lt;div class="</span><input id="class-input" type="text" autocomplete="off"
              spellcheck="false" class="mx-1 input w-1/2 font-mono"><span
              class="font-mono">"&gt;...&lt;/div&gt;</span></div>
          <div id="feedback" class="mt-3 text-center text-sm min-h-[1.4rem]"></div>
        </div>
      </div>

      <div class="flex flex-wrap items-center gap-3">
        <button id="prev-btn" onclick="prevLevel()" class="btn btn-outline">← Précédent</button>
        <button onclick="showHint()" class="btn btn-outline">Indice</button>
        <button id="action-btn" onclick="handleAction()" class="btn btn-success ml-auto">Vérifier ✅</button>
      </div>
    </section>

    <!-- ===================== ECRAN FIN ===================== -->
    <section id="screen-end" class="hidden animate-[pop_0.25s_ease-out]">
      <div class="card bg-base-100 border border-base-300 shadow-sm">
        <div class="card-body items-center text-center py-10 px-8">
          <div class="text-5xl mb-2">🎉</div>
          <h1 id="end-title"
            class="text-3xl font-extrabold mb-3 bg-gradient-to-br from-primary to-secondary bg-clip-text text-transparent">
          </h1>
          <p id="end-message" class="text-base-content/70 leading-relaxed mb-6"></p>

          <button onclick="goHome()" class="btn btn-primary">Retour à l'accueil →</button>
        </div>
      </div>
    </section>


    <footer class="text-center text-xs text-base-content py-4 mt-10">
      <a href="https://github.com/jfcmontmorency/tailwind-basics" target="_blank" rel="noopener noreferrer"
        class="inline-flex items-center gap-1.5 text-base-content/60 hover:text-base-content transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" class="w-4 h-4">
          <path
            d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8Z" />
        </svg>
      </a>
    </footer>
  </main>

  

  <script type="module" src="/src/main.js"></script>
</body>

</html>
